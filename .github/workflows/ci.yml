name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: payments
          POSTGRES_USER: payments
          POSTGRES_PASSWORD: payments
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U payments -d payments"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      PYTHONPATH: ${{ github.workspace }}

      APP_NAME: payment-service
      APP_HOST: 0.0.0.0
      APP_PORT: 8000

      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 5433
      TEST_DB_NAME: payments_test
      TEST_DB_USER: payments
      TEST_DB_PASSWORD: payments

      DATABASE_URL: postgresql+asyncpg://payments:payments@127.0.0.1:5433/payments

      RABBITMQ_HOST: 127.0.0.1
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest

      API_KEY: super-secret-api-key
      WEBHOOK_TIMEOUT: 5
      MAX_RETRIES: 3
      BACKOFF_BASE_SECONDS: 2

      TEST_DATABASE_URL: postgresql+asyncpg://payments:payments@127.0.0.1:5433/payments_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          python - <<'PY'
          import socket
          import time

          host = "127.0.0.1"
          port = 5433

          for _ in range(30):
              try:
                  with socket.create_connection((host, port), timeout=2):
                      print("Postgres is ready")
                      break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("Postgres did not become ready in time")
          PY

      - name: Create test database
        env:
          PGPASSWORD: payments
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql -h 127.0.0.1 -p 5433 -U payments -d postgres -c "CREATE DATABASE payments_test;" || true

      - name: Run linter
        run: ruff check app tests

      - name: Check formatting
        run: ruff format --check app tests

      - name: Run tests
        run: pytest -q